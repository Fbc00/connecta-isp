name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint (Biome)
        run: npm run lint

      - name: Typecheck
        run: |
          npx tsc -p tsconfig.json --noEmit
          npx tsc -p client/tsconfig.json --noEmit

      - name: Test (Vitest)
        run: npm test

      - name: Build
        run: npm run build
