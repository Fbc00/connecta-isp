services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    environment:
      NODE_ENV: development
      PORT: "3000"
      DB_PATH: /data/data.sqlite
    volumes:
      - sqlite:/data
    expose:
      - "3000"
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  sqlite:
